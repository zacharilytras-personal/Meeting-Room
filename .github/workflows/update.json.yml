name: Update JSON

on:
  repository_dispatch:
    types: [update]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write room-status.json
        run: |
          echo '${{ toJson(github.event.client_payload) }}' > room-status.json

      - name: Verify file contents
        run: |
          echo "===== room-status.json ====="
          cat room-status.json
          echo "============================"

      - name: Commit updated JSON
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update room status"
          file_pattern: room-status.json
